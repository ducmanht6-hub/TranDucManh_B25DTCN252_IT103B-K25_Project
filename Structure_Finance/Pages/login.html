<!DOCTYPE html>
<html>
  <head>
    <title>Login</title>
    <link rel="stylesheet" href="../css/login.css">
  </head>
  <body>
    <div class="login-box">
      <img src="../Assets/images/Heading 2 → 🔐 Đăng nhập.png" alt>
      <p id="successMessage" class="success"></p>
      <form id="loginForm" novalidate>
        <input type="email" id="email" placeholder="Email here..." />
        <span class="error" id="emailError"></span>
        <input type="password" id="password" placeholder="Password here..." />
        <span class="error" id="passwordError"></span>
        <button type="submit">Sign In</button>
      </form>
      <p>You don’t have account? <a href="./register.html">Sign Up Now</a></p>
      <script src="../js/login.js"></script>
    </div>
  </body>
</html>
