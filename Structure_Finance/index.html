<!DOCTYPE html>
<html lang="vi">
    <head>
        <meta charset="UTF-8">
        <title>Tài Chính Cá Nhân</title>
        <link rel="stylesheet" href="../Structure_Finance/css/index.css">
        <link rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    </head>
    <body>

        <div class="header">
            <div class="logo">📒 Tài Chính Cá Nhân K24_Rikkei</div>

            <div class="account-menu">
                <div class="account-btn" onclick="toggleMenu()">
                    Tài khoản <i class="fa-solid fa-chevron-down"></i>
                </div>

                <div id="dropdownMenu" style="display: none;">
                    <div onclick="openLogoutModal()">Đăng xuất</div>
                </div>
            </div>
        </div>

        <div class="sidebar">
            <button class="active"> <i class="fa-solid fa-circle-info"></i>
                <span>Information</span></button>
            <button> <i class="fa-solid fa-shapes"></i> <span>Category</span></button>
            <button> <i class="fa-solid fa-clock-rotate-left"></i>
                <span>History</span></button>
        </div>

        <div class="main">

            <div class="banner">
                🎯 Kiểm soát chi tiêu thông minh <br>
                <div>
                    <small>Theo dõi ngân sách và thu chi hằng tháng dễ
                        dàng</small>
                </div>
            </div>

            <h2>📊 Quản Lý Tài Chính Cá Nhân</h2>

            <div class="card">
                <p>Số tiền còn lại</p>
                <h3>0 VND</h3>
            </div>

            <div class="card">
                <label>📅 Chọn tháng:</label>
                <input type="month" value="2025-09">
            </div>

            <div class="card">
                <label>💰 Ngân sách tháng:</label>
                <input type="number" id="budget" placeholder="VD: 5000000">
                <button onclick="saveBudget()">Lưu</button>
            </div>

            <h2>Quản Lý Thông tin cá nhân</h2>
            <div class="profile">
                <div>
                    <label>Name <span class="required">*</span></label><br>
                    <input type="text" value="Nguyen Van A" required>
                </div>

                <div>
                    <label>Email <span class="required">*</span></label><br>
                    <input type="email" value="nguyenvana@gmail.com" required>
                </div>

                <div>
                    <label>Phone <span class="required">*</span></label><br>
                    <input type="text" value="0987654321" required>
                </div>

                <div>
                    <label>Gender <span class="required">*</span></label><br>
                    <select>
                        <option>Male</option>
                        <option>Female</option>
                    </select>
                </div>
            </div>

            <div class="actions">
                <button>Change Information</button>
                <button>Change Password</button>
            </div>

        </div>

        <div id="logoutModal">
            <div class="modal-content">
                <h3 class="modal-title">Xác nhận</h3>
                <p class="modal-text">
                    Bạn có chắc chắn muốn đăng xuất tài khoản này khỏi hệ thống không?
                </p>
                <hr>
                <div class="modal-actions">
                    <button class="cancel-btn"
                        onclick="closeLogoutModal()">Hủy</button>
                    <button class="confirm-btn"
                        onclick="handleLogout()">OK</button>
                </div>
            </div>
        </div>

        <script src="../Structure_Finance/js/index.js"></script>
    </body>
</html>
