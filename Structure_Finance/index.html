<!DOCTYPE html>
<html lang="vi">
    <head>
        <meta charset="UTF-8">
        <title>Tài Chính Cá Nhân</title>
        <link rel="stylesheet" href="../Structure_Finance/css/index.css">
        <link rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
            integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
            crossorigin="anonymous" referrerpolicy="no-referrer" />
    </head>
    <body>

        <div class="header">
            <div class="logo">📒 Tài Chính Cá Nhân K24_Rikkei</div>
            <div class="account">Tài khoản ▼</div>
        </div>

        <div class="sidebar">
            <button class="active"> <i class="fa-solid fa-circle-info"></i></i>
                Information</button>
            <button> <i class="fa-solid fa-shapes"></i> Category</button>
            <button> <i class="fa-solid fa-clock-rotate-left"></i>
                History</button>
        </div>

        <div class="main">

            <div class="banner">
                🎯 Kiểm soát chi tiêu thông minh <br>
                <div>
                    <small>Theo dõi ngân sách và thu chi hằng tháng dễ
                        dàng</small>
                </div>
            </div>

            <h2>📊 Quản Lý Tài Chính Cá Nhân</h2>

            <div class="card">
                <p>Số tiền còn lại</p>
                <h3 id="balance">0 VND</h3>
            </div>

            <div class="card">
                <label>📅 Chọn tháng:</label>
                <input type="month" id="month">
            </div>

            <div class="card">
                <label>💰 Ngân sách tháng:</label>
                <input type="number" id="budget" placeholder="VD: 5000000">
                <button onclick="saveBudget()">Lưu</button>
            </div>

            <h2>Quản Lý Thông tin cá nhân</h2>
            <div class="profile">
                <div>
                    <label>Name <span class="required">*</span></label><br>
                    <input type="text" value="Nguyen Van A" required>
                </div>

                <div>
                    <label>Email <span class="required">*</span></label><br>
                    <input type="email" value="nguyenvana@gmail.com" required>
                </div>

                <div>
                    <label>Phone <span class="required">*</span></label><br>
                    <input type="text" value="0987654321" required>
                </div>

                <div>
                    <label>Gender <span class="required">*</span></label><br>
                    <select>
                        <option>Male</option>
                        <option>Female</option>
                    </select>
                </div>
            </div>

            <div class="actions">
                <button class="outline">Change Information</button>
                <button class="outline">Change Password</button>
            </div>

        </div>

        <script src="script.js"></script>
    </body>
</html>
